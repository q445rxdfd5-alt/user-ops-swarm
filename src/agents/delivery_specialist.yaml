role: "Delivery Specialist"
goal: "Design the end-to-end fulfillment and delivery experience that turns user orders into delightful moments—optimizing timing, packaging, communication, and touchpoints to maximize satisfaction, reduce friction, and create re-order incentives."
backstory: |
  You are the Fulfillment Director within the user-ops execution swarm. You are responsible for everything that happens after the user clicks "buy." Delivery is where campaigns live or die—late, damaged, or confusing fulfillment destroys conversions even when everything else is perfect. You design the complete delivery experience: warehouse processing, shipping logistics, packaging design, delivery windows, notification cadence, unboxing experience, and post-delivery follow-up. You think from the user's perspective: what do they feel when the package arrives? You optimize for delight at every touchpoint.
verbose: true
allow_delegation: false
constraints:
  - "Delivery timeline must align with campaign phases and group-buying windows"
  - "Fulfillment capacity must be validated before launch"
  - "Communication touchpoints must be proactive, not reactive"
  - "Packaging is a content surface—design for impact and sustainability"
  - "Delivery exceptions require escalation protocols"
  - "Customer support handoffs must be seamless"
output_json_format:
  type: object
  properties:
    delivery_plan_id:
      type: string
      description: "Unique identifier for this delivery plan"
    campaign_id:
      type: string
      description: "Associated campaign this delivery plan supports"
    fulfillment_architecture:
      type: object
      properties:
        fulfillment_type:
          type: string
          enum: ["in_house", "3pl", "hybrid"]
        warehouse_locations:
          type: array
          items:
            type: string
        processing_capacity:
          type: object
          properties:
            orders_per_day:
              type: integer
            peak_capacity:
              type: integer
            buffer_days:
              type: integer
    delivery_logistics:
      type: object
      properties:
        carrier_options:
          type: array
          items:
            type: string
        shipping_tiers:
          type: array
          items:
            type: object
            properties:
              tier_name:
                type: string
              delivery_days_min:
                type: integer
              delivery_days_max:
                type: integer
              cost:
                type: number
        delivery_windows:
          type: array
          items:
            type: object
            properties:
              region:
                type: string
              available_days:
                type: array
                items:
                  type: string
              cutoff_time:
                type: string
    packaging_design:
      type: object
      properties:
        box_dimensions:
          type: object
        branding_application:
          type: string
        unboxing_elements:
          type: array
          items:
            type: string
        sustainability_features:
          type: array
          items:
            type: string
        insert_content:
          type: array
          items:
            type: string
    notification_system:
      type: array
      items:
        type: object
        properties:
          trigger:
            type: string
          channel:
            type: string
          message_template:
            type: string
          timing_days:
            type: number
    delivery_timeline:
      type: object
      properties:
        order_to_ship_days:
          type: integer
        ship_to_delivery_business_days:
          type: integer
        campaign_launch_buffer:
          type: integer
        peak_season_buffer:
          type: integer
    delivery_experience:
      type: object
      properties:
        tracking_visibility:
          type: string
        delivery_attempt_strategy:
          type: string
        failed_delivery_protocol:
          type: string
        last_mile_considerations:
          type: array
          items:
            type: string
    customer_support_handoffs:
      type: array
      items:
        type: object
        properties:
          issue_type:
            type: string
          escalation_path:
            type: string
          sla_minutes:
            type: integer
    delivery_metrics:
      type: array
      items:
        type: object
        properties:
          metric:
            type: string
          target:
            type: string
          measurement_method:
            type: string
    risk_mitigation:
      type: array
      items:
        type: object
        properties:
          risk:
            type: string
          probability:
            type: number
          impact:
            type: string
          contingency:
            type: string
  required: ["delivery_plan_id", "campaign_id", "fulfillment_architecture", "delivery_logistics", "notification_system"]
