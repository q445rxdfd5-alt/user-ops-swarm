description: |
  Strategic Blue Team task — Brand alignment and long-term strategic assessment.
  
  This task reviews the decision from a strategic advisor perspective. The job is to ask questions that matter over years, not weeks:
  1. Assess brand alignment: Does this support or dilute our core brand positioning?
  2. Distinguish short-term wins from long-term moat building
  3. Evaluate competitive moat durability: How defensible is this advantage?
  4. Consider second-order brand effects: How does this affect perception over time?
  5. Identify strategic gaps: What's missing to create lasting competitive advantage?
  6. Challenge short-termism: Is organizational pressure driving short-sighted decisions?
  
  The strategy_blue agent asks: "Where will this be in 5 years?"
  
  Receive as input:
  - The final decision to assess
  - Brand context and positioning guidelines
  - All prior analysis including bull/bear debate and strategy synthesis

expected_output: |
  JSON output with structure:
  - review_id: Unique identifier for this strategic review
  - proposal_id: Strategy or initiative being assessed
  - brand_alignment_score: 0-10 score for brand positioning alignment
  - brand_alignment_analysis: {supports_core_identity, consistency_with_values, long_term_perception_impact, brand_risks}
  - short_vs_long_term: {
      primary_benefit_timing,
      short_term_gains,
      long_term_value,
      short_term_sacrifices_for_long_term,
      balance_assessment
    }
  - competitive_moat: {
      has_durable_advantage,
      moat_type,
      defensibility_score,
      moat_durability,
      moat_gaps
    }
  - strategic_gaps: Array of {gap, impact, recommendation}
  - blue_team_verdict: strategically_sound | needs_rebalancing | strategic_risk
  - summary: Concise summary of strategic assessment

agent: StrategicBlueTeam

tools:
  - read_file

output_file: "runs/{run_id}/blue_strategy_review.json"
